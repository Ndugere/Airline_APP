{% extends "flights/base.html" %}

{% block body %}
<h3>Add Flight</h3>

{% if message %}
  <p style="color:red;">{{ message }}</p>
  <hr>
{% endif %}

{% if airports %}
  <form action="{% url 'add_flight' %}" method="post">
      {% csrf_token %}
      
      <label for="origin">Origin:</label>
      <select name="origin_id" id="origin" required>
          <option value="" disabled selected>-- Select Origin --</option>
          {% for airport in airports %}
              <option value="{{ airport.id }}">{{ airport.code }} - {{ airport.city }}</option>
          {% endfor %}
      </select>
      <br><br>

      <label for="destination">Destination:</label>
      <select name="destination_id" id="destination" required>
          <option value="" disabled selected>-- Select Destination --</option>
          {% for airport in airports %}
              <option value="{{ airport.id }}">{{ airport.code }} - {{ airport.city }}</option>
          {% endfor %}
      </select>
      <br><br>

      <label for="duration">Duration (minutes):</label>
      <input type="number" id="duration" name="duration" min="1" required>
      <br><br>

      <button type="submit">Add Flight</button>
  </form>
{% else %}
  <p style="color:red;">No airports available. Please add airports before creating flights.</p>
{% endif %}
<hr>
<a href="{% url 'index'  %}">Go back to all flights</a>
{% endblock %}
