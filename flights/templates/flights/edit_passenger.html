{% extends "flights/base.html "%}

{% block body %}
<h2>Edit Passenger</h2>

{% if message %}
    <h6>{{ message }}</h6>
{% endif %}

<form action="{% url 'edit_passenger' passenger.id %}" method="post">
    {% csrf_token %}
<label for="new_name">New Name: </label>
<input type="text" id="new_name" name="new_name" value="{{ passenger.name }}">
<button type="submit">Save New Name</button>
</form>
<hr>
<a href="{% url 'list_passengers' %}">Back to Passenger List</a>

{% endblock %}
