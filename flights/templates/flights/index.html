{% extends "flights/base.html" %}

{% block body %}
<h3>All Flights</h3>
<ul>
    {% for flight in flights %}
        <a href="{% url 'details' flight.id %}"><li>{{flight.id}}. from: {{ flight.origin }}  to: {{ flight.destination }}</li> </a>
    {% empty %}
        <h3> No flights at the moment</h3>
    {% endfor %}

</ul>

{% endblock %}
