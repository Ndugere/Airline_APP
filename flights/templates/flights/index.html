{% extends "flights/base.html" %}

{% block body %}
<h3>All Flights</h3>
<ul>
    {% for flight in flights %}
        <li>{{flight.id}}. Origin: {{ flight.origin }} destination: {{ flight.destination }} duration: {{ flight.duration }}</li>
    {% empty %}
        <h3> No flights at the moment</h3>
    {% endfor %}

</ul>

{% endblock %}
