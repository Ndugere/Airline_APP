{% extends "flights/base.html" %}

{% block body %}
<h3>All Airports </h3>
{% for airport in airports %}
<p> {{ airport.code }} Airport in {{ airport.city }}  </p>
<form action="{% url 'delete_airport' airport.id %}" method="post">
    {%csrf_token %}
    <button type="submit">Delete</button>
</form>
{% empty %}
<p>No Airport in the database</p>
{% endfor %}
<hr>
<form action="{% url 'add_airport' %}" method="post">
    {% csrf_token %}
    <label for="code">Airport's Code: </label>
    <input type="text" id="code" name="code" required>
     <label for="city">Airport's City: </label>
    <input type="text" id="city" name="city" required>
    <button type="submit">Save Airport </button>
</form>
<hr>
<a href="{% url 'index' %}"> Go to flights page</a>
{%endblock%}
